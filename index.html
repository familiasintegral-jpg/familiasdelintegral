  header p { font-size: 0.95rem; opacity: 0.85; }

  .buscar-wrap { max-width: 560px; margin: 0 auto 0.75rem; position: relative; }
  .buscar-wrap input { width: 100%; padding: 0.65rem 1rem 0.65rem 2.5rem; border: 1.5px solid var(--borde); border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: var(--bg); color: var(--texto); outline: none; transition: border-color .2s; }

  .buscar-wrap svg { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: #888; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .rubros { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .rubro-btn { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; padding: 5px 13px; border-radius: 50px; border: 1.5px solid transparent; cursor: pointer; background: #F0EFEA; color: #4A4A4A; transition: all .15s; }
  .rubro-btn:hover { filter: brightness(0.93); }
  .rubro-btn.activo { background: var(--verde); color: white; border-color: var(--verde); }

  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
  .conteo { font-size: 0.82rem; color: var(--texto-2); margin-bottom: 1rem; }

  .grilla { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .tarjeta { background: var(--blanco); border: 1px solid var(--borde); border-radius: var(--radio); padding: 1.1rem 1.2rem; cursor: pointer; transition: box-shadow .2s, transform .15s; }
  .tarjeta:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); transform: translateY(-2px); }

  .etiqueta { font-size: 0.7rem; font-weight: 500; padding: 3px 10px; border-radius: 50px; display: inline-block; margin-bottom: 9px; }
  .tarjeta-nombre { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 500; color: var(--texto); margin-bottom: 3px; line-height: 1.3; }
  .tarjeta-persona { font-size: 0.78rem; color: var(--texto-2); margin-bottom: 7px; }
  .tarjeta-desc { font-size: 0.8rem; color: var(--texto-2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .modal-fondo { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-fondo.abierto { display: flex; }
  .modal { background: var(--blanco); border-radius: var(--radio); padding: 1.75rem; max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; animation: aparecer .2s ease; }

  .modal-cerrar { position: absolute; top: 1rem; right: 1rem; background: #F0EFEA; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1rem; cursor: pointer; color: #4A4A4A; display: flex; align-items: center; justify-content: center; }
  .modal-etiqueta { font-size: 0.7rem; font-weight: 500; padding: 3px 10px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
  .modal-nombre { font-family: 'Fraunces', serif; font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .modal-persona { font-size: 0.85rem; color: var(--texto-2); margin-bottom: 14px; }
  .modal-desc { font-size: 0.88rem; color: var(--texto-2); line-height: 1.65; white-space: pre-line; margin-bottom: 16px; }
  .modal-links { display: flex; flex-direction: column; gap: 7px; border-top: 1px solid var(--borde); padding-top: 14px; }
  .modal-link { font-size: 0.82rem; color: var(--texto-2); display: flex; align-items: flex-start; gap: 7px; }
  .modal-link a { color: #1D5B9E; word-break: break-all; }

    header { padding: 1.75rem 1rem 1.5rem; }
    .controles { padding: 0.85rem 1rem; }

const COLORES = {
  "Salud y bienestar":    { bg: "#D8F3DC", color: "#2D6A4F" },
  "Arte y creatividad":   { bg: "#FFD6E0", color: "#C9184A" },
  "Educación y clases":   { bg: "#EDE0FF", color: "#5A3E85" },
  "Tecnología":           { bg: "#D0E9FF", color: "#1D5B9E" },
  "Gastronomía y viajes": { bg: "#FFE8CC", color: "#9B4F1A" },
  "Servicios del hogar":  { bg: "#F0EFEA", color: "#4A4A4A" },
  "Moda e indumentaria":  { bg: "#FFE8CC", color: "#7A3E00" },
  "Profesionales":        { bg: "#D0F0F0", color: "#1A6B6B" },
  "Otros":                { bg: "#FFF3C4", color: "#7A5C00" },
};

const RUBROS_ORDEN = [
  "Salud y bienestar","Arte y creatividad","Educación y clases",
  "Tecnología","Gastronomía y viajes","Servicios del hogar",
  "Moda e indumentaria","Profesionales","Otros"
];

let filtroRubro = "Todos";
let textoBusqueda = "";

function estiloEtiqueta(rubro) {
  const c = COLORES[rubro] || COLORES["Otros"];
  return `background:${c.bg};color:${c.color}`;
}

function renderRubros() {
  const cont = document.getElementById("rubros");
  const todos = ["Todos", ...RUBROS_ORDEN];
  cont.innerHTML = todos.map(r =>
    `<button class="rubro-btn${filtroRubro===r?" activo":""}" onclick="setRubro('${r.replace(/'/g,"\\'")}')"> ${r}</button>`
  ).join("");
}

function setRubro(r) { filtroRubro = r; renderRubros(); renderGrilla(); }
function filtrar() { textoBusqueda = document.getElementById("buscar").value.toLowerCase(); renderGrilla(); }

function renderGrilla() {
  const items = EMPRENDIMIENTOS.filter(d => {
    const okRubro = filtroRubro === "Todos" || d.rubro === filtroRubro;
    const q = textoBusqueda;
    const okQ = !q
      || d.nombre.toLowerCase().includes(q)
      || (d.persona||"").toLowerCase().includes(q)
      || (d.desc||"").toLowerCase().includes(q)
      || (d.grado||"").toLowerCase().includes(q)
      || d.rubro.toLowerCase().includes(q);
    return okRubro && okQ;
  });

  document.getElementById("conteo").textContent =
    items.length + " emprendimiento" + (items.length!==1?"s":"") + " encontrado" + (items.length!==1?"s":"");

  const grilla = document.getElementById("grilla");
  if (!items.length) { grilla.innerHTML = '<div class="vacio">No se encontraron resultados.</div>'; return; }

  grilla.innerHTML = items.map(d => {
    const idx = EMPRENDIMIENTOS.indexOf(d);
    return `<div class="tarjeta" onclick="abrirModal(${idx})">
      <span class="etiqueta" style="${estiloEtiqueta(d.rubro)}">${d.rubro}</span>
      <div class="tarjeta-nombre">${d.nombre}</div>
      <div class="tarjeta-persona">${[d.persona,d.grado].filter(Boolean).join(" · ")}</div>
      ${d.desc?`<div class="tarjeta-desc">${d.desc.replace(/\n/g," ")}</div>`:""}
    </div>`;
  }).join("");
}

function abrirModal(idx) {
  const d = EMPRENDIMIENTOS[idx];
  let links = "";
  if (d.ig)   links += `<div class="modal-link"><span>📷</span><span>Instagram: ${d.ig}</span></div>`;
  if (d.web)  links += `<div class="modal-link"><span>🌐</span><a href="${d.web.startsWith("http")?d.web:"https://"+d.web}" target="_blank" rel="noopener">${d.web}</a></div>`;
  if (d.mail) links += `<div class="modal-link"><span>✉️</span><a href="mailto:${d.mail.trim()}">${d.mail.trim()}</a></div>`;
  if (d.tel)  links += `<div class="modal-link"><span>📞</span><span>${d.tel}</span></div>`;
  document.getElementById("modal-interior").innerHTML = `
    <span class="modal-etiqueta" style="${estiloEtiqueta(d.rubro)}">${d.rubro}</span>
    <div class="modal-nombre">${d.nombre}</div>
    <div class="modal-persona">${[d.persona,d.grado].filter(Boolean).join(" · ")}</div>
    ${d.desc?`<div class="modal-desc">${d.desc}</div>`:""}
    ${links?`<div class="modal-links">${links}</div>`:""}
  `;
  document.getElementById("modal-fondo").classList.add("abierto");
}

function cerrarModal() { document.getElementById("modal-fondo").classList.remove("abierto"); }
document.addEventListener("keydown", e => { if (e.key==="Escape") cerrarModal(); });

renderRubros();
renderGrilla();
</script>
